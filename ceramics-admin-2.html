<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ניהול האתר — Golden Earth Ceramics</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Assistant',sans-serif; background:#1A1714; color:#E8E0D5; height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  ::selection { background:#9B7B56; color:#fff; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
  input::placeholder { color:#6E6358; }

  .header { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
  .header-r { display:flex; align-items:center; gap:10px; }
  .logo { font-size:15px; font-weight:600; letter-spacing:1px; color:#C9A87A; }
  .badge { font-size:10px; font-weight:600; background:rgba(201,168,122,.15); color:#C9A87A; padding:3px 8px; border-radius:4px; }
  .status { font-size:12px; color:#6E6358; display:flex; align-items:center; gap:6px; }
  .status-dot { width:6px; height:6px; border-radius:50%; background:#5a8a5e; display:inline-block; }

  .chat { flex:1; overflow-y:auto; padding:20px 20px 10px; display:flex; flex-direction:column; gap:16px; }
  .msg-wrap { display:flex; gap:8px; align-items:flex-start; }
  .msg-wrap.user { justify-content:flex-end; }
  .msg-wrap.ai { justify-content:flex-start; }
  .avatar { width:28px; height:28px; border-radius:50%; background:rgba(201,168,122,.15); color:#C9A87A; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; margin-top:2px; }
  .bubble { padding:10px 16px; max-width:80%; font-size:14px; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
  .bubble.user { background:#9B7B56; color:#fff; border-radius:16px 16px 4px 16px; font-weight:400; }
  .bubble.ai { background:#231F1A; border:1px solid rgba(255,255,255,.06); border-radius:16px 16px 16px 4px; font-weight:300; }
  .bubble .imgs { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .bubble .imgs img { width:60px; height:60px; object-fit:cover; border-radius:6px; }

  .dots span { animation:pulse 1s infinite; font-size:10px; color:#C9A87A; }
  .dots span:nth-child(2) { animation-delay:.2s; }
  .dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  .img-preview { display:none; gap:8px; padding:8px 20px; flex-wrap:wrap; flex-shrink:0; }
  .img-prev-wrap { position:relative; }
  .img-prev-wrap img { width:56px; height:56px; object-fit:cover; border-radius:6px; border:1px solid rgba(255,255,255,.1); }
  .img-prev-x { position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:#b33; color:#fff; border:none; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  .input-bar { display:flex; align-items:center; gap:8px; padding:12px 16px; border-top:1px solid rgba(255,255,255,.06); flex-shrink:0; }
  .attach-btn { background:none; border:none; color:#6E6358; cursor:pointer; padding:4px; display:flex; flex-shrink:0; transition:color .2s; }
  .attach-btn:hover { color:#C9A87A; }
  .msg-input { flex:1; background:#231F1A; border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:11px 16px; font-size:14px; font-weight:300; color:#E8E0D5; outline:none; font-family:'Assistant',sans-serif; transition:border-color .2s; }
  .msg-input:focus { border-color:rgba(201,168,122,.3); }
  .send-btn { background:#9B7B56; border:none; color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity .2s,transform .1s; }
  .send-btn:hover { opacity:.9; }
  .send-btn:active { transform:scale(.95); }
  .send-btn:disabled { opacity:.4; cursor:default; transform:none; }

  .welcome { text-align:center; padding:60px 20px; }
  .welcome-icon { font-size:48px; margin-bottom:16px; opacity:.6; }
  .welcome h2 { font-size:20px; font-weight:400; color:#C9A87A; margin-bottom:8px; }
  .welcome p { font-size:14px; color:#6E6358; font-weight:300; line-height:1.7; max-width:360px; margin:0 auto; }
  .examples { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:20px; }
  .ex-btn { background:rgba(201,168,122,.08); border:1px solid rgba(201,168,122,.12); color:#C9A87A; font-family:'Assistant',sans-serif; font-size:12px; padding:6px 14px; border-radius:20px; cursor:pointer; transition:all .2s; }
  .ex-btn:hover { background:rgba(201,168,122,.18); }

  @media(max-width:600px) {
    .bubble { max-width:88%; }
    .header { padding:12px 14px; }
    .input-bar { padding:10px 12px; }
    .chat { padding:16px 14px 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-r">
    <span class="logo">Golden Earth</span>
    <span class="badge">AI ניהול</span>
  </div>
  <span class="status" id="statusBar"><span class="status-dot"></span>מתחבר...</span>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>ניהול חכם</h2>
    <p>כתבו מה לשנות באתר ואני אטפל בזה. אפשר גם לצרף תמונות.</p>
    <div class="examples" id="examples"></div>
  </div>
</div>

<div class="img-preview" id="imgPreview"></div>

<div class="input-bar">
  <button class="attach-btn" id="attachBtn" title="צרף תמונות">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
  </button>
  <input type="file" id="fileInput" style="display:none" multiple accept="image/*">
  <input type="text" class="msg-input" id="msgInput" placeholder='למשל: "שנה את הכותרת ל-..." או "הוסף קטגוריה"' autocomplete="off">
  <button class="send-btn" id="sendBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const API = "https://us-central1-golden-earth-ceramics.cloudfunctions.net/api";
const KEY = "ceramics-7840314b06cdd0aab381fc85464e7817";
const H = { "Content-Type":"application/json", "x-api-key":KEY };

let imgs = [], busy = false;
const $ = id => document.getElementById(id);

// Examples
["שנה את הכותרת הראשית","תוסיף קטגוריה חדשה","מה יש באתר כרגע?","שנה את מספר הטלפון"].forEach(t => {
  const b = document.createElement("button");
  b.className = "ex-btn"; b.textContent = t;
  b.onclick = () => { $("msgInput").value = t; $("msgInput").focus(); };
  $("examples").appendChild(b);
});

// Load status
(async () => {
  try {
    const r = await fetch(API + "/", { headers:{"x-api-key":KEY} });
    const d = await r.json();
    if (d.success) $("statusBar").innerHTML = '<span class="status-dot"></span>' + (d.data.cats?.length||0) + ' קטגוריות · מחובר';
  } catch(e) { $("statusBar").innerHTML = '<span class="status-dot" style="background:#b33"></span>שגיאה'; }
})();

$("attachBtn").onclick = () => $("fileInput").click();
$("fileInput").onchange = e => { imgs.push(...Array.from(e.target.files)); renderPrev(); e.target.value=""; };

function renderPrev() {
  const el = $("imgPreview");
  if (!imgs.length) { el.style.display="none"; return; }
  el.style.display = "flex";
  el.innerHTML = imgs.map((f,i) => '<div class="img-prev-wrap"><img src="'+URL.createObjectURL(f)+'"><button class="img-prev-x" onclick="rmImg('+i+')">×</button></div>').join("");
}
window.rmImg = i => { imgs.splice(i,1); renderPrev(); };

function esc(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function addMsg(role, text, imgUrls) {
  const w = $("welcome"); if(w) w.style.display="none";
  const d = document.createElement("div");
  d.className = "msg-wrap " + role;
  let h = "";
  if (role==="ai") h += '<div class="avatar">✦</div>';
  h += '<div class="bubble '+role+'">' + esc(text);
  if (imgUrls?.length) h += '<div class="imgs">' + imgUrls.map(u=>'<img src="'+u+'">').join("") + '</div>';
  h += '</div>';
  d.innerHTML = h;
  $("chat").appendChild(d);
  $("chat").scrollTop = $("chat").scrollHeight;
}

function showLoad() {
  const d = document.createElement("div");
  d.className="msg-wrap ai"; d.id="loading";
  d.innerHTML='<div class="avatar">✦</div><div class="bubble ai"><div class="dots"><span>●</span><span>●</span><span>●</span></div></div>';
  $("chat").appendChild(d);
  $("chat").scrollTop = $("chat").scrollHeight;
}
function hideLoad() { const e=$("loading"); if(e)e.remove(); }

function toB64(file) {
  return new Promise(r => { const rd=new FileReader(); rd.onload=()=>r(rd.result); rd.readAsDataURL(file); });
}

async function send() {
  const text = $("msgInput").value.trim();
  if ((!text && !imgs.length) || busy) return;
  busy=true; $("sendBtn").disabled=true; $("msgInput").disabled=true;

  const curImgs = [...imgs]; imgs=[]; renderPrev();
  const previews = curImgs.map(f => URL.createObjectURL(f));
  addMsg("user", text||"📷 תמונות", previews.length?previews:null);
  $("msgInput").value = "";
  showLoad();

  try {
    let b64 = [];
    for (const f of curImgs) b64.push(await toB64(f));

    const res = await fetch(API+"/chat", {
      method:"POST", headers:H,
      body: JSON.stringify({
        message: text + (curImgs.length ? "\n[צורפו "+curImgs.length+" תמונות]" : ""),
        images: b64.length ? b64 : undefined
      })
    });
    const data = await res.json();
    hideLoad();

    if (data.success) {
      addMsg("ai", data.message);
      if (data.data?.cats) $("statusBar").innerHTML = '<span class="status-dot"></span>'+data.data.cats.length+' קטגוריות · מחובר';
    } else {
      addMsg("ai", "שגיאה: " + (data.error||"לא ידוע"));
    }
  } catch(e) { hideLoad(); addMsg("ai","שגיאת תקשורת: "+e.message); }

  busy=false; $("sendBtn").disabled=false; $("msgInput").disabled=false; $("msgInput").focus();
}

$("sendBtn").onclick = send;
$("msgInput").onkeydown = e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };
</script>
</body>
</html>
